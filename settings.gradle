pluginManagement {
    repositories {
        maven { url = 'https://maven.fabricmc.net/' }
        maven { url = 'https://maven.kikugie.dev/releases' }
        gradlePluginPortal()
    }
}

plugins {
    id 'dev.kikugie.stonecutter' version '0.5.1'
}

stonecutter {
    kotlinController = false
    centralScript = 'build.gradle'

    create(":") {
        versions '1.21.8', '1.21.10'
        vcsVersion = '1.21.10'
    }
}

rootProject.name = "IQ"